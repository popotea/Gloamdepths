<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>微光深淵 Gloamdepths</title>
<link rel="stylesheet" href="style.css?v=13">
<!-- PeerJS:與朋友連線用(免費信令服務);沒網路時仍可離線單人遊玩 -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div id="stats">
    <div class="bar hp"><div id="hpfill"></div><span id="hptext"></span></div>
    <div class="bar stamina" title="體力值,按 Shift 衝刺消耗體力,體力不足需等待回復"><div id="stafill"></div><span id="statext"></span></div>
    <div class="bar core" title="星核能量持續流失&#10;挖光晶💠回來按 F 灌入(每顆 +6)&#10;能量歸零 = 全隊失敗"><div id="corefill"></div><span id="coretext"></span></div>
    <div class="bar xp" title="擊殺怪物獲得經驗值,升級增加最大HP與攻擊力"><div id="xpfill"></div><span id="xptext"></span></div>
    <div id="shards"></div>
  </div>
  <div id="wavebox"></div>
  <div id="netbox">
    <button id="hostBtn" class="hidden">🔗 開房邀請朋友</button>
    <div id="roomcode" class="hidden"></div>
    <canvas id="minimap" width="200" height="200"></canvas>
  </div>
  <div id="msglog"></div>
  <div id="chatlog"></div>
  <div id="chatbox" class="hidden">
    <input id="chatInput" maxlength="80" placeholder="輸入訊息,Enter 送出,Esc 取消">
  </div>
  <div id="deathbanner" class="hidden"></div>
  <div id="hotbar"></div>
  <div id="menuPanel" class="menu-panel hidden"></div>
  <div id="invpanel" class="hidden">
    <h3>背包 <span class="hint">(點一格再點另一格可交換;護甲放背包即生效)</span></h3>
    <div id="invgrid"></div>
    <h3>合成 <span class="hint">(✋徒手 🛠️需工作台 🔥需熔爐)</span></h3>
    <div id="crafttabs"></div>
    <div id="craftlist"></div>
  </div>
  <div id="overlay" class="hidden"></div>
  <div id="tileTip" class="hidden"></div>
</div>
<script src="js/config.js?v=13"></script>
<script src="js/sfx.js?v=13"></script>
<script src="js/world.js?v=13"></script>
<script src="js/inventory.js?v=13"></script>
<script src="js/entities.js?v=13"></script>
<script src="js/game.js?v=13"></script>
<script src="js/net.js?v=13"></script>
<script src="js/render.js?v=13"></script>
<script src="js/ui.js?v=13"></script>
<script src="js/main.js?v=13"></script>
</body>
</html>

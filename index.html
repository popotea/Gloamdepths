<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>微光深淵 Gloamdepths</title>
<link rel="stylesheet" href="style.css?v=73">
<!-- PeerJS:與朋友連線用(免費信令服務);沒網路時仍可離線單人遊玩 -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div id="stats">
    <div class="bar hp"><div id="hpfill"></div><span id="hptext"></span></div>
    <div class="bar stamina" title="體力值,按 Shift 衝刺消耗體力,體力不足需等待回復"><div id="stafill"></div><span id="statext"></span></div>
    <div class="bar core" title="星核能量持續流失&#10;挖光晶💠回來按 F 灌入(每顆 +6)&#10;能量滿了繼續灌會超載轉成護盾🛡️,優先擋暗潮傷害&#10;能量歸零 = 全隊失敗"><div id="corefill"></div><span id="coretext"></span></div>
    <div class="bar xp" title="擊殺怪物獲得經驗值,升級增加最大HP與攻擊力,並獲得 1 天賦點(按 T 分配)"><div id="xpfill"></div><span id="xptext"></span></div>
    <div id="shards"></div>
    <div id="buffbar" title="料理 buff:吃帶效果的料理獲得,時間到自動消失"></div>
    <div id="talentbadge" class="hidden" title="按 T 或點這裡打開天賦面板"></div>
  </div>
  <div id="wavebox"></div>
  <div id="netbox">
    <button id="hostBtn" class="hidden">🔗 開房邀請朋友</button>
    <div id="roomcode" class="hidden"></div>
    <canvas id="minimap" width="200" height="200" title="點一下打開大地圖(或按 M)"></canvas>
    <div id="mapOpenHint">🗺️ 按 M 看大地圖</div>
    <div id="teamList"></div>
  </div>
  <div id="msglog"></div>
  <div id="chatlog"></div>
  <div id="chatbox" class="hidden">
    <input id="chatInput" maxlength="80" placeholder="輸入訊息,Enter 送出,Esc 取消">
  </div>
  <div id="deathbanner" class="hidden"></div>
  <div id="hotbar"></div>
  <div id="menuPanel" class="menu-panel hidden"></div>
  <div id="powerPanel" class="menu-panel hidden"></div>
  <div id="talentPanel" class="menu-panel hidden"></div>
  <div id="traderPanel" class="menu-panel hidden"></div>
  <div id="storagePanel" class="menu-panel hidden"></div>
  <div id="emotePanel" class="menu-panel hidden"></div>
  <div id="invpanel" class="panel-glass hidden">
    <h3>背包 <button id="btnSortInv" class="mini">🧹 整理</button>
      <span class="hint">(左鍵點一格再點另一格可交換;右鍵點裝備可強化;右鍵護甲類/拖進裝備欄可穿上)</span></h3>
    <div id="equipSlots">
      <div class="eqslot" data-part="head" title="頭盔"><span class="eqicon">🪖</span><span class="icon"></span><span class="eqlabel">頭盔</span></div>
      <div class="eqslot" data-part="chest" title="胸甲"><span class="eqicon">🛡️</span><span class="icon"></span><span class="eqlabel">胸甲</span></div>
      <div class="eqslot" data-part="legs" title="護腿"><span class="eqicon">🥾</span><span class="icon"></span><span class="eqlabel">護腿</span></div>
      <div class="eqslot" data-part="accessory" title="飾品"><span class="eqicon">💍</span><span class="icon"></span><span class="eqlabel">飾品</span></div>
    </div>
    <div id="invgrid"></div>
    <div id="enhPanel" class="hidden"></div>
    <h3>合成 <span class="hint">(✋徒手 🛠️需工作台 🔥需熔爐)</span></h3>
    <div id="crafttabs"></div>
    <div id="craftlist"></div>
  </div>
  <div id="towerPanel" class="panel-glass hidden">
    <h3>🏹 箭塔 <span class="hint">(把箭矢拖進彈藥格補彈;超出上限的部分會自動退回背包)</span></h3>
    <div id="towerBody"></div>
  </div>
  <div id="overlay" class="hidden"></div>
  <div id="tileTip" class="hidden"></div>
  <div id="mapPanel" class="hidden">
    <canvas id="mapCanvas"></canvas>
    <div id="mapTip" class="hidden"></div>
    <div id="mapHint">🖱️滾輪縮放・拖曳平移・M/Esc 關閉</div>
  </div>
</div>
<script src="js/config.js?v=73"></script>
<script src="js/sfx.js?v=73"></script>
<script src="js/world.js?v=73"></script>
<script src="js/inventory.js?v=73"></script>
<script src="js/entities.js?v=73"></script>
<script src="js/game.js?v=73"></script>
<script src="js/net.js?v=73"></script>
<script src="js/render.js?v=73"></script>
<script src="js/ui.js?v=73"></script>
<script src="js/main.js?v=73"></script>
</body>
</html>
